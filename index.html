<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <!-- WordPress Friendly Font Loading (safe to remove if WP handles fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #111111;
      --accent: #ff4d6d;
      --text: #ffffff;
      --light: #f4f4f4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      color: #d1d5db;
      margin-bottom: 40px;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(255,255,255,0.05);
      padding: 20px 25px;
      border-radius: 12px;
      min-width: 90px;
      backdrop-filter: blur(10px);
    }

    .time-box h2 {
      font-size: 32px;
      color: var(--accent);
    }

    .time-box span {
      font-size: 14px;
      color: #cbd5f5;
    }

    /* Email Form */
    .email-form {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .email-form input {
      padding: 14px 16px;
      border-radius: 8px;
      border: none;
      width: 260px;
      font-size: 15px;
      outline: none;
    }

    .email-form button {
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .email-form button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #9ca3af;
    }

    /* Responsive */
    /* 📱 Mobile (<=600px) */
/* 📱 STRONG MOBILE OPTIMIZATION */
@media (max-width: 480px) {

  body {
    padding: 15px;
    height: auto;
  }

  .container {
    padding: 15px 10px;
  }

  .logo img {
    max-width: 140px;
  }

  h1 {
    font-size: 26px;
    line-height: 1.3;
  }

  p {
    font-size: 14px;
    margin-bottom: 25px;
  }

  /* Countdown → perfect 2x2 grid */
  .countdown {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .time-box {
    padding: 12px;
    min-width: unset;
  }

  .time-box h2 {
    font-size: 20px;
  }

  .time-box span {
    font-size: 12px;
  }

  /* Email form full width */
  .email-form {
    flex-direction: column;
    gap: 10px;
  }

  .email-form input {
    width: 100%;
    font-size: 14px;
    padding: 12px;
  }

  .email-form button {
    width: 100%;
    padding: 12px;
    font-size: 14px;
  }

  footer {
    font-size: 12px;
    margin-top: 25px;
  }
}

/* 📲 Tablet (601px – 900px) */
@media (min-width: 601px) and (max-width: 900px) {
  .time-box {
    flex: 1 1 70px;
  }

  .email-form input {
    max-width: 250px;
  }
}
  </style>
</head>
<body>

  <div class="container">

    <div class="logo"><img src="./WhatsApp_Image_2026-03-27_at_5.13.35_PM-removebg-preview.png" 
      alt="Krishva Enterprise Logo" 
      style="max-width: 200px; height: auto;"></div>

    <h1>We're Launching Soon 🚀</h1>

    <p>Our website is under construction. We're working hard to launch something amazing for you.</p>

    <!-- Countdown Timer -->
    <div class="countdown">
      <div class="time-box">
        <h2 id="days">00</h2>
        <span>Days</span>
      </div>
      <div class="time-box">
        <h2 id="hours">00</h2>
        <span>Hours</span>
      </div>
      <div class="time-box">
        <h2 id="minutes">00</h2>
        <span>Minutes</span>
      </div>
      <div class="time-box">
        <h2 id="seconds">00</h2>
        <span>Seconds</span>
      </div>
    </div>

    <!-- Email Form (WordPress Friendly) -->
 <form class="email-form">
  <input type="email" id="email" placeholder="Enter your email" required>
  <button type="button" onclick="handleSubmit(event)">Notify Me</button>
</form>

    <footer>
      © <span id="year"></span> Krishva Enterprise. All Rights Reserved.
    </footer>

  </div>

  <script>
    function handleSubmit(event) {
  event.preventDefault(); // page reload stop

  const email = document.getElementById("email").value;

  // Email validation regex
  const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  if (!emailPattern.test(email)) {
    alert("❌ Please enter a valid email address");
    return false;
  }

  // Success alert
  alert("✅ Thank you! You will be notified when we launch 🚀");

  // Optional: clear input
  document.getElementById("email").value = "";

  return false;
}
    // ===== COUNTDOWN DATE (EDIT THIS DATE) =====
    const launchDate = new Date("May 1, 2026 12:00:00").getTime();

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "<h2>We Are Live 🎉</h2>";
      }
    }, 1000);

    // Dynamic Year
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
